server {
  listen 80;
  listen [::]:80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # gzip text-like assets on the fly.
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    application/javascript
    application/json
    image/svg+xml;

  # Long-cache fingerprinted build assets (Vite emits content-hashed filenames).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Never cache the HTML shell so new deploys are picked up immediately.
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  # SPA fallback: any unknown path serves the app shell.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
